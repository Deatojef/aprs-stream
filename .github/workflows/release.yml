name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  TARGET: aarch64-unknown-linux-gnu

jobs:
  release:
    name: Build and publish aarch64 release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        run: rustup toolchain install stable --profile minimal

      - name: Install cross and cargo-deb
        run: |
          cargo install cross --locked
          cargo install cargo-deb --locked

      - name: Cross-compile aprs-streamd
        run: cross build --release --target "$TARGET" -p aprs-streamd

      - name: Build .deb (arm64)
        # --no-build: reuse the cross binary; --no-strip: it's already stripped
        # via the release profile (host strip can't strip an aarch64 binary).
        run: cargo deb -p aprs-streamd --target "$TARGET" --no-build --no-strip

      - name: Collect artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${TARGET}/debian/"*.deb dist/
          ( cd dist && sha256sum ./*.deb > SHA256SUMS )
          ls -l dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/SHA256SUMS
          generate_release_notes: true
