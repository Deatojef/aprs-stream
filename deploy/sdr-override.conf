# systemd drop-in for aprs-streamd when using the direct-SDR ([sdr]) source.
#
# The shipped unit is hardened for the network-only RTP path, where the service
# needs no hardware at all. In particular PrivateDevices=true gives it a private
# /dev containing only pseudo-devices, so USB nodes are invisible and the dongle
# cannot be opened — you'd see "failed to open RTL-SDR" in the journal.
#
# This drop-in relaxes exactly what USB capture needs, and nothing more: real
# device nodes become visible, but only USB character devices are permitted.
#
# Install:
#   sudo mkdir -p /etc/systemd/system/aprs-streamd.service.d
#   sudo cp /usr/share/doc/aprs-streamd/sdr-override.conf \
#           /etc/systemd/system/aprs-streamd.service.d/sdr.conf
#   sudo systemctl daemon-reload
#   sudo systemctl restart aprs-streamd
#
# Two things outside systemd are also required — see DEPLOY.md:
#   1. Blacklist the DVB kernel driver, which claims RTL-SDR hardware as a TV
#      tuner (dvb_usb_rtl28xxu / rtl2832 / rtl2830).
#   2. A udev rule granting a group access to the dongle, with the service user
#      in that group. The group below must match the one in your rule.

[Service]
# Expose real device nodes so /dev/bus/usb is reachable.
PrivateDevices=false

# Permit only USB character devices (major 189, "usb_device" in /proc/devices).
# Listing any DeviceAllow= keeps the default DevicePolicy=auto restricted to just
# these entries, so this grants USB and still denies the rest of /dev.
DeviceAllow=char-usb_device rw

# The unprivileged aprs-streamd user needs the group your udev rule grants on the
# dongle node. Change this if your rule uses a group other than plugdev.
SupplementaryGroups=plugdev
