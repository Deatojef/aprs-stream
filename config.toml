# aprs-streamd configuration.
#
# Search order (first match wins):
#   1. path given as the first CLI argument  (aprs-streamd /path/to/config.toml)
#   2. $APRS_STREAMD_CONFIG
#   3. ./config.toml            (local development — this file)
#   4. /etc/aprs-streamd/config.toml   (intended deployed location)
#
# Commented-out keys show their built-in default; uncomment to override.

# ── Audio source (choose EXACTLY ONE of [source] or [sdr]) ───────────────────

# ── Option A: RTP audio source (ka9q-radio) ─────────────────────────────────
# Where aprs-streamd listens for ka9q-radio PCM audio (handled by aprs-rtp).
#[source]
# mDNS hostname (e.g. "packet.local") or a raw multicast address (e.g. "239.0.0.1").
#host = "packet.local"
# RTP port.
# port = 5004
# Network interface IP to bind to. Empty / omitted = OS default. Set explicitly
# on a multi-homed host.
# interface = "192.168.1.10"
# RTP reorder window in packets (~80 ms at 24 kHz with the default of 2).
# jitter_buffer = 2
# SSRC allowlist. Empty = accept every SSRC on the group. Each SSRC maps 1:1 to a
# radiod demodulator channel (frequency).
# ssrc = [144390, 144340]

# ── Option B: direct RTL-SDR source (no ka9q-radio) ─────────────────────────
# Comment out [source] above and uncomment this to capture straight from a dongle.
# The channelizer slices all channels from one wideband capture; keep every
# channel within ±(0.8 · sample_rate/2) of the centre, and offset the centre so no
# channel sits on 0 Hz (the RTL DC spike).
[sdr]
# device = 0                              # dongle index
center_hz = 145080000                   # tuner centre (offset from the channels)
channels_hz = [144390000,144340000,144360000,144905000,145535000,145645000,145710000,145765000,145825000]               # one entry per frequency; ssrc = freq_kHz
sample_rate = 2160000                   # ~1.9 MHz usable at 2.4 MSPS if you need span
gain = 402                              # tuner gain in tenths dB (max ~496), or "hw-agc"
# ppm = 0                                 # frequency correction
# fm_maxdev_hz = 20000.0                  # FM deviation mapped to full-scale audio (rec level)
# squelch_open_db = 4.0                   # squelch open threshold (dB SNR)
# squelch_close_db = 2.0                  # squelch close threshold (dB SNR)
# deemphasis = false                      # true = ka9q-style de-emphasis

# ── Decoder tuning ──────────────────────────────────────────────────────────
# AFSK demodulator / slicer settings (aprs-rtp). Defaults suit standard 1200-baud
# APRS; leave the whole section out to accept all defaults.
[decoder]
# mark_hz = 1200
# space_hz = 2200
# baud = 1200
# Parallel amplitude-imbalance slicers (1–16). More = better weak-signal capture
# at higher CPU cost.
# slicers = 8
slicers = 9
# Slicer ladder range in twist dB (mark-minus-space). The default -12..+9 over 8
# slicers is a 3 dB step with a rung landing on 0 dB.
# min_twist_db = -12.0
# max_twist_db = 9.0
max_twist_db = 12.0
# CRC error-recovery mode: "none", "single", or "double".
# fix_bits = "single"

# ── Publish (emit) side ─────────────────────────────────────────────────────
# Where decoded frames are published. The multicast group is always a destination;
# add explicit unicast targets for the cross-VLAN / reliability escape hatch.
[emit]
# Multicast group to publish on (administratively-scoped 239.x range).
group = "239.12.34.56"
# UDP port.
port = 17014
# Local interface to send from. 0.0.0.0 = OS chooses; set explicitly on a
# multi-homed host so multicast egresses the right interface.
# interface = "0.0.0.0"
# Multicast TTL. 1 keeps traffic on-subnet (the safe default).
# ttl = 1
# Extra unicast destinations as "ip:port". Each decoded frame is also sent here.
# destinations = ["10.0.5.20:17014", "10.0.5.21:17014"]
